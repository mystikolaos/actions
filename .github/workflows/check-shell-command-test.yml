# please read UNLICENSE file for details.

name: Test 'Check shell command' workflow

on:
  push:
  workflow_dispatch:
jobs:
  test-command:
    uses: mystikolaos/actions/.github/workflows/check-shell-command.yml@main
    with:
      command: "ls"

  test-command-output:
    uses: mystikolaos/actions/.github/workflows/check-shell-command.yml@main
    with:
      command: "touch output.txt"
      expected-file: "output.txt"

  test-script:
    uses: mystikolaos/actions/.github/workflows/check-shell-command.yml@main
    with:
      command: "test/hello"
      make-executable: true

  test-script-output:
    uses: mystikolaos/actions/.github/workflows/check-shell-command.yml@main
    with:
      command: "test/hello"
      make-executable: true
      expected-file: "hello.txt"
